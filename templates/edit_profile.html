{% extends "base.html" %}

{% block content %}

<!-- EDIT PROFILE HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h2 mb-1">
            <i class="fas fa-user-edit text-primary me-2"></i>Edit Your Profile
        </h1>
        <p class="text-muted mb-0">Update your personal information</p>
    </div>
    <button class="btn btn-outline-secondary" onclick="window.history.back()">
        <i class="fas fa-arrow-left me-1"></i>Back
    </button>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-custom">
            <div class="card-body p-4">
                {% if message %}
                    <div class="alert alert-info alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endif %}

                <form method="POST" action="/edit_profile" class="needs-validation" novalidate>
                    
                    <!-- PERSONAL INFORMATION -->
                    <div class="mb-4">
                        <h5 class="mb-3">
                            <i class="fas fa-id-card text-primary me-2"></i>Personal Information
                        </h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control" value="{{ current_user.name }}" disabled>
                                <small class="text-muted">Contact admin to change your name</small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                                <small class="text-muted">Contact admin to change your email</small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Role</label>
                                <input type="text" class="form-control" value="Patient" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Member Since</label>
                                <input type="text" class="form-control" value="2024" disabled>
                            </div>
                        </div>
                    </div>

                    <!-- CONTACT INFORMATION -->
                    <div class="mb-4">
                        <h5 class="mb-3">
                            <i class="fas fa-phone text-primary me-2"></i>Contact Information
                        </h5>
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Phone Number</label>
                                <input type="tel" name="phone" class="form-control" placeholder="Enter your phone number">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Address</label>
                                <textarea name="address" class="form-control" rows="3" placeholder="Enter your address"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- FORM ACTIONS -->
                    <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                        <a href="/dashboard" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Save Changes
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Form validation
(function () {
    'use strict'

    var forms = document.querySelectorAll('.needs-validation')

    Array.prototype.slice.call(forms)
        .forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }

                form.classList.add('was-validated')
            }, false)
        })
})()
</script>

<style>
.shadow-custom {
    box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075) !important;
}

.form-label {
    color: #495057;
    font-weight: 600;
}
</style>

{% endblock %}
