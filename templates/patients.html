<!DOCTYPE html>
<html>
<head>
<title>Patients</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="text-align:center;font-family:Arial">

<h2>All Patients</h2>

<a href="/export">
<button>Export CSV</button>
</a>

<br><br>

<table class="table table-striped table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Heart Rate</th>
<th>Risk</th>
<th>Actions</th>
</tr>

{% for p in patients %}

<tr>

<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td>{{p[6]}}</td>
<td>{{p[8]}}</td>

<td>
<a href="/edit/{{p[0]}}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{p[0]}}" class="btn btn-danger btn-sm">Delete</a>
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Home</a>

</body>
</html>
