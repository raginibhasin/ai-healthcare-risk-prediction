<!DOCTYPE html>
<html>
<head>

<title>Patient Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<span class="navbar-brand mb-0 h1">🏥 AI Healthcare Dashboard</span>
</div>
</nav>


<div class="container mt-5">

<h2 class="text-center mb-5">Patient Risk Analytics</h2>

<div class="row text-center">

<div class="col-md-3">
<div class="card bg-primary text-white p-3">
<h4>Total</h4>
<h2>{{total}}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger text-white p-3">
<h4>High Risk</h4>
<h2>{{high}}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card bg-warning text-white p-3">
<h4>Medium Risk</h4>
<h2>{{medium}}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success text-white p-3">
<h4>Low Risk</h4>
<h2>{{low}}</h2>
</div>
</div>

</div>
